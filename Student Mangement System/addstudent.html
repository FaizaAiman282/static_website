            max-width: 500px;

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Student Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="addstudent.html">Add Student</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="viewstudent.html">View Student</a>
                    </li>
                    <li class="nav-item">

                    </li>
                </ul>

    <div class="form-bg-wrapper">
        <form id="studentForm" class="student-form">
            <h2 class="mb-4 text-center">Add Student Fields</h2>
            
            <div class="mb-3">
                <label for="studentId" class="form-label">Student ID</label>
                <input type="text" class="form-control" id="studentId" name="id" minlength="1" required>
            </div>
            
            <div class="mb-3">
                <label for="studentName" class="form-label">Student Name</label>
                <input type="text" class="form-control" id="studentName" name="name" minlength="1" required>
            </div>
            
            <div class="mb-3">
                <label for="studentBranch" class="form-label">Branch</label>
                <input type="text" class="form-control" id="studentBranch" name="branch" minlength="1" required>
            </div>
            
            <div class="mb-4">
                <label for="studentCgpa" class="form-label">CGPA</label>
                <input type="number" class="form-control" id="studentCgpa" name="cgpa" step="0.01" min="0" max="10" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100">Submit</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
document.getElementById("studentForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const student = {
        id: document.getElementById("studentId").value,
        name: document.getElementById("studentName").value,
        branch: document.getElementById("studentBranch").value,
        cgpa: document.getElementById("studentCgpa").value
    };

    await fetch("http://localhost:3000/students", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(student)
    });

    alert("Student Added Successfully");
    window.location.href = "viewstudent.html";
});
</script>
</body>
