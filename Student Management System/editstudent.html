<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <style>
        .form-bg-wrapper {
            background-color: rgb(231, 205, 253);
            min-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .student-form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Student Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="addstudent.html">Add Student</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="viewstudent.html">View Student</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="editstudent.html">Edit Student</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="logout.html">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="form-bg-wrapper">
        <form id="editStudentForm" class="student-form">
            <h2 class="mb-4 text-center">Modify Student Fields</h2>
            
            <div class="mb-3">
                <label for="editId" class="form-label">Student ID (Read-only)</label>
                <input type="text" class="form-control bg-light" id="editId" name="id" readonly>
            </div>
            
            <div class="mb-3">
                <label for="editName" class="form-label">Student Name</label>
                <input type="text" class="form-control" id="editName" name="name" minlength="4" required>
            </div>
            
            <div class="mb-3">
                <label for="editBranch" class="form-label">Branch</label>
                <input type="text" class="form-control" id="editBranch" name="branch" minlength="1" required>
            </div>
            
            <div class="mb-4">
                <label for="editCgpa" class="form-label">CGPA</label>
                <input type="number" class="form-control" id="editCgpa" name="cgpa" step="0.01" min="0" max="10" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100">Update Profile</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
document.addEventListener('DOMContentLoaded', async function () {

    const studentId = localStorage.getItem('editStudentId');

    if (!studentId) {
        alert("No student selected");
        window.location.href = "viewstudent.html";
        return;
    }

    try {
        const response = await fetch(
            `http://localhost:3000/students/${studentId}`
        );

        const student = await response.json();

        document.getElementById('editId').value = student.id;
        document.getElementById('editName').value = student.name;
        document.getElementById('editBranch').value = student.branch;
        document.getElementById('editCgpa').value = student.cgpa;

    } catch (error) {
        console.error(error);
        alert("Unable to load student details");
    }
});

document.getElementById('editStudentForm').addEventListener('submit', async function (event) {

    event.preventDefault();

    const id = document.getElementById('editId').value;

    const updatedStudent = {
        id: id,
        name: document.getElementById('editName').value,
        branch: document.getElementById('editBranch').value,
        cgpa: document.getElementById('editCgpa').value
    };

    try {

        const response = await fetch(
            `http://localhost:3000/students/${id}`,
            {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updatedStudent)
            }
        );

        if (response.ok) {
            localStorage.removeItem('editStudentId');
            alert("Student updated successfully!");
            window.location.href = "viewstudent.html";
        } else {
            alert("Failed to update student");
        }

    } catch (error) {
        console.error(error);
        alert("Server error");
    }
});
</script>
</body>
</html>
