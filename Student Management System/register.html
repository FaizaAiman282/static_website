<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <style>
        /* Matches your structural system theme */
        .form-bg-wrapper {
            background-color: rgb(231, 205, 253);
            min-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .student-form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 480px;
            width: 100%;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Student Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="register.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="form-bg-wrapper">
        <form id="registerForm" class="student-form">
            <h2 class="mb-4 text-center text-dark">Create an Account</h2>

            <div class="mb-3">
                <label for="regUsername" class="form-label">Username</label>
                <input 
                    type="text" 
                    class="form-control"
                    id="regUsername"
                    name="username"
                    minlength="3"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="regEmail" class="form-label">Email</label>
                <input 
                    type="email" 
                    class="form-control"
                    id="regEmail"
                    name="email"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="regPassword" class="form-label">Password</label>
                <input 
                    type="password" 
                    class="form-control"
                    id="regPassword"
                    name="password"
                    minlength="6"
                    required
                >
            </div>

            <div class="mb-4">
                <label for="regPasswordconfirm" class="form-label">Confirm Password</label>
                <input 
                    type="password" 
                    class="form-control"
                    id="regPasswordconfirm"
                    name="confirmPassword"
                    minlength="6"
                    required
                >
            </div>

            <button type="submit" class="btn btn-success w-100">Register</button>
            
            <div class="text-center mt-3">
                <small class="text-muted">Already have an account? <a href="login.html" class="text-decoration-none text-secondary fw-bold">Login here</a></small>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const user = {
        username: document.getElementById("regUsername").value,
        password: document.getElementById("regPassword").value
    };

    await fetch("http://localhost:3000/users", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(user)
    });

    alert("Registration Successful");
    window.location.href = "login.html";
});
</script>

</body>
</html>
