<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <style>
        .page-bg-wrapper {
            background-color: rgb(231, 205, 253);
            min-height: 90vh;
            padding: 40px 20px;
        }
        .table-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Student Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="addstudent.html">Add Student</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="viewstudent.html">View Student</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="logout.html">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-bg-wrapper">
        <div class="container table-card">
            <h1 class="mb-4 text-center text-dark">Registered Students List</h1>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle m-0">
                    <thead class="table-dark">
                        <tr>
                            <th scope="col">Student ID</th>
                            <th scope="col">Name</th>
                            <th scope="col">Branch</th>
                            <th scope="col">CGPA</th>
                            <th scope="col" style="min-width: 160px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderTable();
        });

        function renderTable() {
            const tableBody = document.getElementById('studentTableBody');
            const students = JSON.parse(localStorage.getItem('students')) || [];

            tableBody.innerHTML = "";

            if (students.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">No student records found in local storage.</td></tr>`;
                return;
            }

            students.forEach((student, index) => {
                const row = document.createElement('tr');

                row.innerHTML = `
                    <td class="fw-bold">${student.id}</td>
                    <td>${student.name}</td>
                    <td >${student.branch} </td>
                    <td>${student.cgpa}</td>
                    <td>
                        <button onclick="prepareEdit('${student.id}')" class="btn btn-sm btn-success me-2">Edit</button>
                        <button onclick="deleteStudent(${index})" class="btn btn-sm btn-danger">Delete</button>
                    </td>
                `;

                tableBody.appendChild(row);
            });
        }

        function deleteStudent(index) {
            if (confirm("Are you sure you want to delete this student record?")) {
                let students = JSON.parse(localStorage.getItem('students')) || [];
                
                students.splice(index, 1);
                localStorage.setItem('students', JSON.stringify(students));
                
                renderTable();
            }
        }

        function prepareEdit(studentId) {
            localStorage.setItem('editStudentId', studentId);
            window.location.href = "editstudent.html";
        }
    </script>
</body>
</html>
